version: '3.8'
services:
  db:
    image: ankane/pgvector:latest
    container_name: travelmate_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: travelmate
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d travelmate" ]
      interval: 5s
      timeout: 5s
      retries: 5

  migration:
    image: postgres:14
    container_name: travelmate_migrator
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/travelmate?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    command: [ "/bin/bash", "./run_migrations.sh" ]

volumes:
  db_data:
