version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: travelmate_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: travelmate
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Auto-run init script for dev convenience (only runs if db is empty)
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./migrations/002_add_accommodations.sql:/docker-entrypoint-initdb.d/002_add_accommodations.sql
      - ./migrations/003_upgrade_itinerary_schema.sql:/docker-entrypoint-initdb.d/003_upgrade_itinerary_schema.sql
      - ./migrations/004_add_price_history.sql:/docker-entrypoint-initdb.d/004_add_price_history.sql
      - ./migrations/005_create_tourist_attractions.sql:/docker-entrypoint-initdb.d/005_create_tourist_attractions.sql
      - ./migrations/006_update_system_prompts.sql:/docker-entrypoint-initdb.d/006_update_system_prompts.sql
      - ./migrations/007_create_performance_metrics.sql:/docker-entrypoint-initdb.d/007_create_performance_metrics.sql
      - ./migrations/008_update_prompts.sql:/docker-entrypoint-initdb.d/008_update_prompts.sql
      - ./migrations/009_create_users_table.sql:/docker-entrypoint-initdb.d/009_create_users_table.sql
      - ./migrations/010_create_transport_seed_options.sql:/docker-entrypoint-initdb.d/010_create_transport_seed_options.sql
      - ./migrations/011_add_plan_data_to_trips.up.sql:/docker-entrypoint-initdb.d/011_add_plan_data_to_trips.up.sql
      - ./migrations/012_fix_user_id_type.up.sql:/docker-entrypoint-initdb.d/012_fix_user_id_type.up.sql
      - ./migrations/013_add_alternatives_prompt.sql:/docker-entrypoint-initdb.d/013_add_alternatives_prompt.sql
      - ./migrations/014_update_prompts.sql:/docker-entrypoint-initdb.d/014_update_prompts.sql
      - ./migrations/015_alter_table_trips.sql:/docker-entrypoint-initdb.d/015_alter_table_trips.sql
      - ./migrations/016_create_master_vibes.sql:/docker-entrypoint-initdb.d/016_create_master_vibes.sql
      - ./migrations/017_insert_prompt_planner_agent.sql:/docker-entrypoint-initdb.d/017_insert_prompt_planner_agent.sql
      - ./migrations/018_update_prompt_generate_itinerary.sql:/docker-entrypoint-initdb.d/018_update_prompt_generate_itinerary.sql
      - ./migrations/019_update_trips_table.sql:/docker-entrypoint-initdb.d/019_update_trips_table.sql
      - ./migrations/020_cron_job_delete_trips.sql:/docker-entrypoint-initdb.d/020_cron_job_delete_trips.sql
      - ./migrations/020_update_location_type_prompt.sql:/docker-entrypoint-initdb.d/020_update_location_type_prompt.sql
      - ./migrations/021_update_logistics_prompt.sql:/docker-entrypoint-initdb.d/021_update_logistics_prompt.sql
      - ./migrations/022_refine_essentials_prompt.sql:/docker-entrypoint-initdb.d/022_refine_essentials_prompt.sql
      - ./migrations/023_force_essentials_data.sql:/docker-entrypoint-initdb.d/023_force_essentials_data.sql
      - ./migrations/024_split_planner_prompts.sql:/docker-entrypoint-initdb.d/024_split_planner_prompts.sql
      - ./migrations/025_add_briefing_to_itinerary.sql:/docker-entrypoint-initdb.d/025_add_briefing_to_itinerary.sql
      - ./migrations/026_merge_discovery_to_itinerary.sql:/docker-entrypoint-initdb.d/026_merge_discovery_to_itinerary.sql
      - ./migrations/027_update_logistics_prompt_airlines.sql:/docker-entrypoint-initdb.d/027_update_logistics_prompt_airlines.sql
      - ./migrations/028_add_subscription_to_users.sql:/docker-entrypoint-initdb.d/028_add_subscription_to_users.sql
      - ./migrations/029_create_trip_quotas.sql:/docker-entrypoint-initdb.d/029_create_trip_quotas.sql
      - ./migrations/030_create_subscription_events.sql:/docker-entrypoint-initdb.d/030_create_subscription_events.sql

volumes:
  db_data: